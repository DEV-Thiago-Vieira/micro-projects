<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novel Day | Tracker, Planner and Writer</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <div class="novel-container">
        <div class="text-modifiers">
          <button class="modifier-btn" id="bold-btn"><strong>B</strong></button>
          <button class="modifier-btn" id="italic-btn"><em>I</em></button>
          <button class="modifier-btn" id="underline-btn"><u>U</u></button>
          <button class="modifier-btn" id="strikethrough-btn"><s>S</s></button>
        </div>
        <textarea
          name="novel-content"
          class="novel-content"
          placeholder="Write your text..."
        ></textarea>
      </div>
    </main>
  </body>
  <script
    src="https://kit.fontawesome.com/afda6c43b4.js"
    crossorigin="anonymous"
  ></script>
  <script src="script.js"></script>
</html>
