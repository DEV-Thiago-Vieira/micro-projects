<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do list</title>
  </head>
  <body>
    <main>
      <h1>To Do List</h1>
      <em>A simple to do list developed with HTML, CSS, and JavaScript</em>
      <div class="list">
        <label class="option">
          <input type="checkbox" name="1" id="1" value="1" />
          <span>Go to the gym</span>
        </label>
        <button class="new-task">Create new task</button>
      </div>
    </main>
  </body>
</html>
