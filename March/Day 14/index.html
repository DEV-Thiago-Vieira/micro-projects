<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To do list</title>
  </head>
  <body>
    <main>
      <h1>To Do List</h1>
      <em>A simple to do list developed with HTML, CSS, and JavaScript</em>
      <div class="list">
        <div class="option">
          <label class="check">
            <input type="checkbox" name="0" id="0" value="0" />
            <span>Buy groceries</span>
          </label>
          <div class="icons">
            <span class="icon"
              ><i title="Edit" class="fa-solid fa-pen"></i
            ></span>
            <span class="icon"
              ><i title="Save" class="fa-solid fa-floppy-disk"></i
            ></span>
            <span class="icon"
              ><i title="Delete" class="fa-solid fa-trash"></i
            ></span>
          </div>
        </div>
        <form class="new-task-form">
          <input
            type="text"
            placeholder="Write your task..."
            class="new-task-input"
            required
          />
          <button class="confirm-task">+</button>
        </form>
      </div>
    </main>
  </body>
  <script
    src="https://kit.fontawesome.com/afda6c43b4.js"
    crossorigin="anonymous"
  ></script>
</html>
